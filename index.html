<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Moderno</title>
    <style>
        /* CSS INTEGRADO PARA NÃO DAR ERRO */
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Essencial para o input não sair da tela */
        }
        input:focus { border-color: #007bff; outline: none; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit:hover { background: #0056b3; }
        .row { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <form id="cadastroForm">
            <h2>Novo Cliente</h2>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                </div>
            </div>
            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>
    </div>

    <script>
        // JAVASCRIPT SIMPLIFICADO QUE NÃO TRAVA
        const telInput = document.getElementById('telefone');
        const form = document.getElementById('cadastroForm');

        // Máscara de telefone simples
        telInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        form.onsubmit = (e) => {
            e.preventDefault();
            alert("Cliente " + document.getElementById('nome').value + " cadastrado com sucesso!");
            form.reset();
        };
    </script>
</body>
</html>
