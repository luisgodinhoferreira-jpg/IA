<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Cliente</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>



    <div class="container">

        <form id="cadastroForm">

            <h2>Novo Cliente</h2>

            <p>Preencha as informações abaixo para realizar o registro.</p>



            <div class="input-group">

                <label for="nome">Nome Completo</label>

                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>

            </div>



            <div class="input-group">

                <label for="email">E-mail</label>

                <input type="email" id="email" name="email" placeholder="joao@exemplo.com" required>

            </div>



            <div class="row">

                <div class="input-group">

                    <label for="telefone">Telefone</label>

                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">

                </div>



                <div class="input-group">

                    <label for="nascimento">Data de Nascimento</label>

                    <input type="date" id="nascimento" name="nascimento">

                </div>

            </div>



            <div class="input-group">

                <label for="endereco">Endereço</label>

                <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro">

            </div>



            <button type="submit" class="btn-submit">Cadastrar Cliente</button>

        </form>

    </div>



</body>

</html>
